<!DOCTYPE html>
<!--
  Caderno de Cifras — v0.4.0 (jul/2026)
  Arquitetura correta: frontend estático (este arquivo, no GitHub Pages) sem nenhum
  segredo + backend Supabase com login de verdade (e-mail/senha do professor).
  Autorização no servidor via RLS travada na lista de editores (supabase-setup.sql):
  todo mundo lê, só o professor escreve — mesmo que o cadastro público fique ligado
  por engano, contas estranhas não conseguem escrever nada.
  Sem configurar o CONFIG abaixo, roda em Modo Demonstração (dados locais).
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Caderno de Cifras</title>
<meta name="description" content="Cifras, batidas, riffs e solos das aulas de violão e guitarra.">
<meta name="theme-color" content="#171310">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; media-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
/* ============ Tokens — "braço de jacarandá, cordas de latão" ============ */
:root{
  --bg:#171310;            /* jacarandá escuro */
  --surface:#201a15;
  --raised:#2a221b;
  --line:#3a2f24;
  --line-soft:#2e2620;
  --brass:#d9a441;         /* latão */
  --brass-bright:#f0bd5e;
  --brass-dim:#9c7a3a;
  --ivory:#f3ead9;         /* madrepérola/ivory */
  --muted:#a8977f;
  --faint:#7a6c58;
  --ok:#8fb87a;
  --danger:#d96a5b;
  --danger-soft:#4a2721;
  --shadow:0 10px 30px rgba(0,0,0,.45);
  --radius:14px;
  --radius-sm:9px;
  --cifra-size:15px;
  --mono:ui-monospace,'SF Mono','Cascadia Mono','Roboto Mono','JetBrains Mono',Menlo,Consolas,monospace;
  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --body:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--ivory);
  font-family:var(--body);
  font-size:16px;
  line-height:1.5;
  min-height:100dvh;
  padding-bottom:env(safe-area-inset-bottom);
}
::selection{background:var(--brass);color:#1b150e}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
input,textarea,select{font:inherit;color:var(--ivory)}
a{color:var(--brass-bright)}
:focus-visible{outline:2px solid var(--brass-bright);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}
}

/* ============ Topbar ============ */
#topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:10px;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  background:linear-gradient(180deg,rgba(23,19,16,.97),rgba(23,19,16,.88));
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line-soft);
}
#topbar .brand{
  display:flex;align-items:center;gap:10px;flex:1;min-width:0;
  text-align:left;
}
#topbar .brand svg{flex:none}
#topbar .brand .t{
  font-family:var(--display);font-weight:800;font-size:18px;letter-spacing:.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#topbar .brand .s{display:block;font-family:var(--body);font-weight:400;font-size:11px;color:var(--muted);letter-spacing:.4px}
.iconbtn{
  width:40px;height:40px;flex:none;border-radius:12px;
  display:grid;place-items:center;color:var(--muted);
  transition:background .15s,color .15s;
}
.iconbtn:hover,.iconbtn:active{background:var(--raised);color:var(--ivory)}

/* ============ Layout ============ */
#view{max-width:760px;margin:0 auto;padding:16px 14px 120px}
.eyebrow{
  font-size:11px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;
  color:var(--brass);margin-bottom:6px;
}
h1.page{font-family:var(--display);font-weight:800;font-size:26px;line-height:1.15;margin-bottom:4px}
.sub{color:var(--muted);font-size:14px}

/* divisor "corda" */
.string-rule{
  height:2px;border:0;margin:18px 0;
  background:linear-gradient(90deg,transparent,var(--brass-dim) 18%,var(--brass) 50%,var(--brass-dim) 82%,transparent);
  opacity:.55;border-radius:2px;
}

/* ============ Busca ============ */
.search{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:12px 14px;margin:14px 0 18px;
  transition:border-color .15s;
}
.search:focus-within{border-color:var(--brass-dim)}
.search svg{flex:none;color:var(--faint)}
.search input{flex:1;background:none;border:0;outline:0;font-size:16px}
.search input::placeholder{color:var(--faint)}

/* ============ Lista de músicas ============ */
.songrow{
  display:flex;align-items:center;gap:14px;width:100%;
  padding:14px 12px;border-radius:var(--radius);
  border:1px solid transparent;text-align:left;
  transition:background .15s,border-color .15s;
}
.songrow:hover,.songrow:active{background:var(--surface);border-color:var(--line-soft)}
.songrow .dot{
  width:12px;height:12px;flex:none;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff8e8,var(--brass) 55%,#6e5526 100%);
  box-shadow:0 1px 3px rgba(0,0,0,.6);
}
.songrow .info{flex:1;min-width:0}
.songrow .title{font-family:var(--display);font-weight:700;font-size:17px;line-height:1.25}
.songrow .meta{font-size:13px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.songrow .chev{color:var(--faint);flex:none}
.badge{
  display:inline-block;font-size:11px;font-weight:600;letter-spacing:.5px;
  padding:2px 8px;border-radius:999px;border:1px solid var(--line);
  color:var(--muted);vertical-align:middle;
}
.badge.b-iniciante{color:var(--ok);border-color:rgba(143,184,122,.4)}
.badge.b-intermediário,.badge.b-intermediario{color:var(--brass-bright);border-color:var(--brass-dim)}
.badge.b-avançado,.badge.b-avancado{color:var(--danger);border-color:rgba(217,106,91,.45)}

.empty{
  text-align:center;padding:52px 20px;color:var(--muted);
}
.empty .big{font-family:var(--display);font-weight:700;font-size:19px;color:var(--ivory);margin-bottom:6px}

/* ============ Página da música ============ */
.song-head{padding:6px 2px 2px}
.song-head h1{font-family:var(--display);font-weight:800;font-size:27px;line-height:1.12}
.song-head .artist{color:var(--muted);font-size:15px;margin-top:3px}
.song-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.chip{
  font-size:12.5px;font-weight:600;color:var(--muted);
  background:var(--surface);border:1px solid var(--line);
  border-radius:999px;padding:5px 12px;
}
.chip b{color:var(--brass-bright);font-weight:700}

/* barra de ferramentas fixa da música */
.songbar{
  position:sticky;top:calc(60px + env(safe-area-inset-top));z-index:30;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:rgba(32,26,21,.96);backdrop-filter:blur(8px);
  border:1px solid var(--line);border-radius:var(--radius);
  padding:8px;margin:16px 0;
}
.songbar .grp{display:flex;align-items:center;gap:2px;background:var(--bg);border-radius:10px;padding:2px}
.songbar .grp .lbl{font-size:11.5px;color:var(--faint);padding:0 6px;letter-spacing:.4px}
.tbtn{
  min-width:38px;height:36px;padding:0 10px;border-radius:8px;
  display:grid;place-items:center;font-weight:700;font-size:14px;color:var(--ivory);
  transition:background .15s;
}
.tbtn:hover,.tbtn:active{background:var(--raised)}
.tbtn.on{background:var(--brass);color:#1b150e}
.tbtn .tom{color:var(--brass-bright);font-family:var(--mono)}
.tbtn.on .tom{color:#1b150e}

/* blocos */
.block{margin:22px 0}
.block-h{
  display:flex;align-items:center;gap:10px;margin-bottom:10px;
}
.block-h .tag{
  font-size:10.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--brass);
}
.block-h .name{font-family:var(--display);font-weight:700;font-size:16px}
.block-h::after{
  content:"";flex:1;height:1px;
  background:linear-gradient(90deg,var(--line),transparent);
}

/* cifra */
.cifra{
  font-family:var(--mono);font-size:var(--cifra-size);line-height:1.45;
  overflow-x:auto;padding:2px 0 6px;
  -webkit-overflow-scrolling:touch;
}
.cifra .ln{white-space:pre;min-height:1.2em}
.cifra .ln.chords-only{margin:4px 0}
.chordtxt{
  color:var(--brass-bright);font-weight:700;cursor:pointer;
  border-bottom:1px dotted var(--brass-dim);
}
.chordtxt:hover{color:#ffd98a}

/* tablatura */
pre.tab{
  font-family:var(--mono);font-size:calc(var(--cifra-size) - 1px);line-height:1.4;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:12px;overflow-x:auto;color:#e9dfcb;
  -webkit-overflow-scrolling:touch;
}

/* batida (assinatura visual) */
.strum{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 12px 12px;
}
.strum-lane{
  position:relative;display:flex;gap:4px;align-items:stretch;
  padding:6px 2px 2px;overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.strum-lane::before{
  content:"";position:absolute;left:0;right:0;top:50%;height:1px;
  background:linear-gradient(90deg,transparent,var(--brass-dim),transparent);opacity:.5;
}
.beat{
  flex:1;min-width:34px;height:64px;position:relative;
  display:grid;place-items:center;border-radius:8px;
}
.beat .sym{font-size:30px;line-height:1;font-weight:700}
.beat.d .sym{color:var(--brass-bright)}
.beat.u .sym{color:var(--ivory)}
.beat.x .sym{color:var(--muted);font-size:24px}
.beat.r .sym{color:var(--faint);font-size:20px}
.beat .n{position:absolute;bottom:2px;font-size:10px;color:var(--faint);font-family:var(--mono)}
.beat.group-start{border-left:1px solid var(--line-soft)}
.strum-foot{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.strum-foot .bpm{font-size:12.5px;color:var(--muted)}
.strum-foot .bpm b{color:var(--brass-bright);font-family:var(--mono)}

/* nota */
.note{
  border-left:3px solid var(--brass);background:var(--surface);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  padding:12px 14px;color:#e6dcc8;font-size:14.5px;
}

/* áudio */
audio.player{width:100%;margin-top:10px;height:40px;border-radius:10px}

/* auto-scroll flutuante */
#floatbar{
  position:fixed;right:14px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:45;
  display:flex;align-items:center;gap:8px;
}
#floatbar .speed{display:none;align-items:center;gap:4px;background:var(--raised);border:1px solid var(--line);border-radius:999px;padding:4px}
#floatbar.scrolling .speed{display:flex}
#floatbar .speed button{width:34px;height:34px;border-radius:50%;font-weight:800;color:var(--ivory)}
#floatbar .speed span{font-size:12px;color:var(--muted);min-width:26px;text-align:center;font-family:var(--mono)}
.fab{
  width:54px;height:54px;border-radius:50%;
  background:var(--brass);color:#1b150e;box-shadow:var(--shadow);
  display:grid;place-items:center;
  transition:transform .12s;
}
.fab:active{transform:scale(.94)}
.fab.secondary{background:var(--raised);color:var(--ivory);border:1px solid var(--line)}

/* ============ Botões ============ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:46px;padding:0 20px;border-radius:12px;
  font-weight:700;font-size:15px;
  background:var(--brass);color:#1b150e;
  transition:filter .15s,transform .1s;
}
.btn:hover{filter:brightness(1.07)}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--surface);color:var(--ivory);border:1px solid var(--line)}
.btn.danger{background:var(--danger-soft);color:#f3b3a9;border:1px solid rgba(217,106,91,.4)}
.btn.small{min-height:38px;padding:0 14px;font-size:13.5px;border-radius:10px}
.btn.block{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ============ Formulários / Editor ============ */
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);letter-spacing:.4px;margin-bottom:6px}
.input,select.input,textarea.input{
  width:100%;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:12px 13px;font-size:16px;outline:0;
  transition:border-color .15s;
}
.input:focus{border-color:var(--brass-dim)}
textarea.input{font-family:var(--mono);font-size:14px;line-height:1.5;min-height:130px;resize:vertical;white-space:pre;overflow-x:auto}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.edblock{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-bottom:14px;
}
.edblock .edhead{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.edblock .edhead .tag{
  font-size:10.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--brass);
  flex:1;
}
.edblock .edhead .mv{
  width:34px;height:34px;border-radius:8px;display:grid;place-items:center;
  color:var(--muted);background:var(--bg);
}
.edblock .edhead .mv:hover{color:var(--ivory)}
.edblock .edhead .mv.del:hover{color:var(--danger)}

.palette{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 10px}
.palette .pc{
  font-family:var(--mono);font-weight:700;font-size:13px;
  background:var(--bg);border:1px solid var(--line);color:var(--brass-bright);
  border-radius:8px;padding:6px 10px;
}
.palette .pc:active{background:var(--raised)}
.palette .pc.util{color:var(--muted);font-family:var(--body);font-weight:600}

.addmenu{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.addmenu button{
  background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius);
  padding:16px 10px;text-align:center;color:var(--muted);font-weight:600;font-size:14px;
  transition:border-color .15s,color .15s;
}
.addmenu button:hover{border-color:var(--brass-dim);color:var(--ivory)}
.addmenu button .big{display:block;font-size:22px;margin-bottom:4px;color:var(--brass)}

/* editor de batida */
.strum-editor .beats{display:flex;gap:4px;overflow-x:auto;padding:4px 0}
.strum-editor .bslot{
  flex:1;min-width:38px;height:64px;border-radius:8px;
  background:var(--bg);border:1px solid var(--line);
  display:grid;place-items:center;font-size:26px;font-weight:700;
  color:var(--faint);transition:border-color .1s;
}
.strum-editor .bslot.d{color:var(--brass-bright);border-color:var(--brass-dim)}
.strum-editor .bslot.u{color:var(--ivory);border-color:var(--line)}
.strum-editor .bslot.x{color:var(--muted)}
.strum-editor .hint{font-size:12px;color:var(--faint);margin-top:8px}

/* gravador */
.rec-ui{text-align:center;padding:8px 0}
.rec-ui .time{font-family:var(--mono);font-size:30px;font-weight:700;margin:10px 0;color:var(--ivory)}
.rec-ui .time.live{color:var(--danger)}
.recdot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--danger);margin-right:8px;animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* ============ Modais (bottom-sheet) ============ */
#modal-root:empty{display:none}
.modal-back{
  position:fixed;inset:0;z-index:60;background:rgba(10,8,6,.66);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadein .18s;
}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sheet{
  width:100%;max-width:560px;max-height:88dvh;overflow-y:auto;
  background:var(--surface);border:1px solid var(--line);border-bottom:0;
  border-radius:20px 20px 0 0;padding:18px 18px calc(22px + env(safe-area-inset-bottom));
  animation:slideup .22s cubic-bezier(.2,.8,.3,1);
}
@keyframes slideup{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
@media(min-width:600px){
  .modal-back{align-items:center;padding:20px}
  .sheet{border-radius:20px;border-bottom:1px solid var(--line)}
}
.sheet .grab{width:42px;height:4px;border-radius:4px;background:var(--line);margin:0 auto 14px}
.sheet h2{font-family:var(--display);font-weight:700;font-size:19px;margin-bottom:12px}
.sheet .actions{display:flex;gap:10px;margin-top:18px}
.sheet .actions .btn{flex:1}

/* diagrama de acorde */
.diagram-wrap{text-align:center;padding:6px 0 2px}
.diagram-wrap .cname{font-family:var(--display);font-weight:800;font-size:30px;color:var(--brass-bright)}
.diagram-wrap .cbass{font-size:13px;color:var(--muted);margin-top:2px}
.diagram-wrap svg{margin-top:10px}
.diagram-wrap .nodiag{color:var(--muted);padding:26px 10px;font-size:14.5px}

/* ============ Toast / banner ============ */
#toast-root{position:fixed;left:0;right:0;bottom:calc(86px + env(safe-area-inset-bottom));z-index:70;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{
  background:var(--raised);border:1px solid var(--line);color:var(--ivory);
  border-radius:999px;padding:10px 18px;font-size:14px;font-weight:600;
  box-shadow:var(--shadow);animation:slideup .2s;
  max-width:88vw;text-align:center;
}
.toast.ok{border-color:rgba(143,184,122,.5)}
.toast.err{border-color:rgba(217,106,91,.5)}
.banner{
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(90deg,rgba(217,164,65,.12),rgba(217,164,65,.04));
  border:1px solid var(--brass-dim);border-radius:var(--radius);
  padding:10px 14px;margin-bottom:14px;font-size:13.5px;color:#e8d9ba;
}
.banner b{color:var(--brass-bright)}

/* menu lateral simples */
.menu-list{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.menu-list button, .menu-list label.mbtn{
  display:flex;align-items:center;gap:12px;text-align:left;
  padding:14px 12px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;
}
.menu-list button:hover,.menu-list label.mbtn:hover{background:var(--raised)}
.menu-list .mut{color:var(--muted);font-weight:400;font-size:13px;margin-left:auto}

/* rodapé */
footer.app{
  text-align:center;color:var(--faint);font-size:12px;padding:30px 0 10px;
}
footer.app button{color:var(--faint);text-decoration:underline dotted;font-size:12px}

/* impressão: só a música */
@media print{
  body{background:#fff;color:#111}
  #topbar,#floatbar,.songbar,footer.app,.banner{display:none!important}
  .cifra .ln{white-space:pre-wrap}
  .chordtxt{color:#000;border:0;font-weight:800}
  pre.tab,.strum,.note{border-color:#bbb;background:#fff;color:#111}
}
</style>
</head>
<body>
<div id="app">
  <header id="topbar"></header>
  <main id="view" aria-live="polite"></main>
</div>
<div id="floatbar"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
/* =====================================================================
   CONFIG — edite apenas este bloco.
   1) Sem preencher URL/KEY: o app roda em MODO DEMONSTRAÇÃO (dados locais,
      editor liberado) — ideal para testar agora.
   2) Para produção: crie o projeto no Supabase, rode o supabase-setup.sql,
      e cole abaixo a URL e a anon key (Settings → API).
===================================================================== */
const CONFIG = {
  SUPABASE_URL: "",        // ex.: "https://xxxxx.supabase.co" (Settings → API)
  SUPABASE_ANON_KEY: "",   // chave "anon public" — é pública por design: só concede o que as regras RLS permitem (leitura)

<script>
/* ============================ UTILITÁRIOS ============================ */
const $  = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uuid = () => (crypto.randomUUID ? crypto.randomUUID() :
  'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16);
  }));
const norm = s => String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();

/* armazenamento seguro: usa localStorage; se indisponível (sandbox/aba privada), memória */
const safeStore = (() => {
  let mem = {};
  let ok = false;
  try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); ok = true; } catch(e){}
  return {
    get(k){ try { return ok ? localStorage.getItem(k) : (mem[k] ?? null); } catch(e){ return mem[k] ?? null; } },
    set(k,v){ try { if(ok) localStorage.setItem(k,v); else mem[k]=v; } catch(e){ mem[k]=v; } },
    del(k){ try { if(ok) localStorage.removeItem(k); else delete mem[k]; } catch(e){ delete mem[k]; } },
    persistent: ok
  };
})();

function el(tag, props = {}, ...children){
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(props||{})){
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2), v);
    else if (k === "dataset") Object.assign(n.dataset, v);
    else if (v !== null && v !== undefined && v !== false) n.setAttribute(k, v === true ? "" : v);
  }
  for (const c of children.flat()){
    if (c === null || c === undefined || c === false) continue;
    n.append(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
}

function toast(msg, kind=""){ 
  const t = el("div", {class:"toast "+kind}, msg);
  $("#toast-root").append(t);
  setTimeout(() => { t.style.opacity="0"; t.style.transition="opacity .3s"; setTimeout(()=>t.remove(), 320); }, 2600);
}

function fmtTime(s){ const m=Math.floor(s/60), r=Math.floor(s%60); return m+":"+String(r).padStart(2,"0"); }
const fmtDate = iso => { try { return new Date(iso).toLocaleDateString("pt-BR"); } catch(e){ return ""; } };

/* ============================ ESTADO ============================ */
const S = {
  remote: !!(CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY),
  songs: [],            // índice leve [{id,title,artist,difficulty,song_key,updated_at}]
  session: null,        // sessão do professor (remote) — em demo, sempre "logado"
  route: null,
  role: null,           // "professor" | "aluno" | "nenhum" (definido após login via meu_papel)
  scroller: { active:false, speed:1, raf:0 }
};
const isLoggedIn = () => S.remote ? !!S.session : true;
const isEditor   = () => S.remote ? (S.role === "professor") : true;

/* ============================ CAMADA DE DADOS ============================ */
/* ---- Modo demonstração: safeStore ---- */
const DemoDB = {
  _all(){ try { return JSON.parse(safeStore.get("demo_songs") || "null") || demoSeed(); } catch(e){ return demoSeed(); } },
  _save(list){ safeStore.set("demo_songs", JSON.stringify(list)); },
  async list(){ return this._all().map(lightSong).sort(byTitle); },
  async get(id){ return this._all().find(s => s.id === id) || null; },
  async upsert(song){
    const list = this._all().filter(s => s.id !== song.id);
    list.push(song); this._save(list); return song;
  },
  async remove(id){ this._save(this._all().filter(s => s.id !== id)); },
  async uploadAudio(blob){ // demo: base64 inline
    if (blob.size > 2.5*1024*1024) throw new Error("No modo demonstração, áudios até ~2,5 MB. Grave um trecho mais curto.");
    return await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(new Error("Falha ao ler o áudio."));
      r.readAsDataURL(blob);
    });
  }
};

/* ---- Modo produção: Supabase via REST (sem dependências externas) ---- */
const SB = {
  base: CONFIG.SUPABASE_URL,
  key: CONFIG.SUPABASE_ANON_KEY,
  tokens: null, // {access_token, refresh_token, expires_at, user}
  loadSession(){
    try { this.tokens = JSON.parse(safeStore.get("sb_session") || "null"); } catch(e){ this.tokens = null; }
    if (this.tokens) S.session = this.tokens.user || {};
    return this.tokens;
  },
  saveSession(t){
    if (t) { t.expires_at = Date.now() + ((t.expires_in || 3600) - 60) * 1000; }
    this.tokens = t;
    if (t) safeStore.set("sb_session", JSON.stringify(t)); else safeStore.del("sb_session");
    S.session = t ? (t.user || {}) : null;
  },
  async ensureFresh(){
    if (!this.tokens) return;
    if (Date.now() < (this.tokens.expires_at || 0)) return;
    try {
      const r = await fetch(this.base + "/auth/v1/token?grant_type=refresh_token", {
        method:"POST", headers:{ "apikey":this.key, "Content-Type":"application/json" },
        body: JSON.stringify({ refresh_token: this.tokens.refresh_token })
      });
      if (!r.ok) throw 0;
      this.saveSession(await r.json());
    } catch(e){ this.saveSession(null); }
  },
  async login(email, password){
    const r = await fetch(this.base + "/auth/v1/token?grant_type=password", {
      method:"POST", headers:{ "apikey":this.key, "Content-Type":"application/json" },
      body: JSON.stringify({ email, password })
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error_description || j.msg || "E-mail ou senha incorretos.");
    this.saveSession(j);
    return j.user;
  },
  async signup(email, password, code, nome){
    const r = await fetch(this.base + "/auth/v1/signup", {
      method:"POST", headers:{ "apikey":this.key, "Content-Type":"application/json" },
      body: JSON.stringify({ email, password, data: { convite: code, nome: nome || "" } })
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok){
      const raw = (j.msg || j.error_description || j.message || "").toLowerCase();
      if (raw.includes("registered") || raw.includes("already")) throw new Error("Já existe uma conta com esse e-mail. Tente entrar.");
      // o gatilho do banco bloqueia convites inválidos; a mensagem exata do Postgres nem sempre volta
      throw new Error("Não foi possível criar a conta. O convite pode ser inválido ou já ter sido usado — peça um novo link ao professor.");
    }
    if (j.access_token){ this.saveSession(j); return { session:true }; }
    // e-mail de confirmação ligado: conta criada, mas precisa confirmar
    return { session:false };
  },
  async loadRole(){
    if (!this.tokens){ S.role = null; return null; }
    try {
      const r = await fetch(this.base + "/rest/v1/rpc/meu_papel", { method:"POST", headers: await this.headers() });
      const v = await r.json();
      S.role = (typeof v === "string") ? v : (Array.isArray(v) ? v[0] : null);
    } catch(e){ S.role = null; }
    return S.role;
  },
  logout(){ this.saveSession(null); S.role = null; },
  async recover(email){
    const r = await fetch(this.base + "/auth/v1/recover", {
      method:"POST", headers:{ "apikey":this.key, "Content-Type":"application/json" },
      body: JSON.stringify({ email })
    });
    if (!r.ok){ let m = "Não foi possível enviar o e-mail de redefinição."; try { const j = await r.json(); m = j.msg || j.error_description || m; } catch(e){} throw new Error(m); }
  },
  async updatePassword(password, accessToken){
    const r = await fetch(this.base + "/auth/v1/user", {
      method:"PUT",
      headers:{ "apikey":this.key, "Content-Type":"application/json", "Authorization":"Bearer " + accessToken },
      body: JSON.stringify({ password })
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.msg || j.error_description || "Não foi possível salvar a nova senha.");
    return j;
  },
  async headers(json=true){
    await this.ensureFresh();
    const h = { "apikey": this.key, "Authorization": "Bearer " + (this.tokens?.access_token || this.key) };
    if (json) h["Content-Type"] = "application/json";
    return h;
  },
  async rest(path, opts={}){
    const r = await fetch(this.base + "/rest/v1/" + path, { ...opts, headers: { ...(await this.headers()), ...(opts.headers||{}) } });
    if (!r.ok){
      let msg = "Erro de comunicação com o servidor (" + r.status + ").";
      try { const j = await r.json(); msg = j.message || j.hint || msg; } catch(e){}
      if (r.status === 401){ this.saveSession(null); msg = "Sua sessão expirou. Entre novamente."; }
      if (r.status === 403) msg = "Sem permissão para esta ação.";
      throw new Error(msg);
    }
    if (r.status === 204) return null;
    const txt = await r.text();          // inserts com Prefer:return=minimal voltam 201 sem corpo
    return txt ? JSON.parse(txt) : null;
  }
};

const RemoteDB = {
  async list(){
    const rows = await SB.rest("songs?select=id,title,artist,difficulty,song_key,updated_at&order=title.asc");
    return rows.map(lightSong);
  },
  async get(id){
    const rows = await SB.rest("songs?select=*&id=eq." + encodeURIComponent(id));
    return rows[0] || null;
  },
  async upsert(song){
    const rows = await SB.rest("songs", {
      method:"POST",
      headers:{ "Prefer":"resolution=merge-duplicates,return=representation" },
      body: JSON.stringify([song])
    });
    return rows[0];
  },
  async remove(id){
    await SB.rest("songs?id=eq." + encodeURIComponent(id), { method:"DELETE" });
  },
  async uploadAudio(blob, path){
    const h = await SB.headers(false);
    const r = await fetch(SB.base + "/storage/v1/object/audios/" + path, {
      method:"POST",
      headers:{ ...h, "Content-Type": blob.type || "application/octet-stream", "x-upsert":"true" },
      body: blob
    });
    if (!r.ok) throw new Error("Falha ao enviar o áudio (" + r.status + "). Verifique se você está logado.");
    return SB.base + "/storage/v1/object/public/audios/" + path;
  }
};

const DB = () => S.remote ? RemoteDB : DemoDB;

/* nome do caderno/professor: padrão do CONFIG, personalizável pelo professor (tabela app_config) */

const lightSong = s => ({ id:s.id, title:s.title, artist:s.artist, difficulty:s.difficulty, song_key:s.song_key, updated_at:s.updated_at });
const byTitle = (a,b) => norm(a.title).localeCompare(norm(b.title));

<script>
/* ============================ MOTOR MUSICAL ============================ */
const SHARPS = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLATS  = ["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];
const SEMI = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };

function parseChord(sym){
  const m = /^([A-G])([#b]?)([^/]*)(?:\/([A-G][#b]?))?$/.exec(sym.trim());
  if (!m) return null;
  let semi = SEMI[m[1]] + (m[2]==="#" ? 1 : m[2]==="b" ? -1 : 0);
  semi = ((semi % 12) + 12) % 12;
  return { semi, qual: m[3] || "", bass: m[4] || null, flat: m[2]==="b" };
}
function noteName(semi, flat){ return (flat ? FLATS : SHARPS)[((semi%12)+12)%12]; }
function transposeChord(sym, delta, preferFlat){
  const p = parseChord(sym);
  if (!p) return sym;
  let out = noteName(p.semi + delta, preferFlat) + p.qual;
  if (p.bass){
    const b = parseChord(p.bass);
    if (b) out += "/" + noteName(b.semi + delta, preferFlat);
  }
  return out;
}
function usesFlats(song){
  if ((song.song_key||"").includes("b")) return true;
  return (song.blocks||[]).some(b => (b.content||"").includes("[") && /\[[A-G]b/.test(b.content||""));
}

/* qualidade → forma normalizada */
function normQual(q){
  q = (q||"").replace("º","dim").replace("°","dim").trim();
  if (q === "" ) return "maj";
  if (/^(maj7|7\+|7M|M7)$/i.test(q)) return "maj7";
  if (/^m(in)?7$/.test(q)) return "m7";
  if (/^m(in)?$/.test(q)) return "m";
  if (q === "7") return "7";
  if (/^sus4?$/.test(q) || q === "4") return "sus4";
  if (q === "sus2") return "sus2";
  return q; // desconhecida — pode não ter diagrama
}

/* acordes abertos (cordas 6→1; -1 = não toca; 0 = solta) */
const OPEN_SHAPES = {
  "0_maj":[-1,3,2,0,1,0],  "0_7":[-1,3,2,3,1,0],  "0_maj7":[-1,3,2,0,0,0],   // C
  "2_maj":[-1,-1,0,2,3,2], "2_m":[-1,-1,0,2,3,1], "2_7":[-1,-1,0,2,1,2],
  "2_m7":[-1,-1,0,2,1,1],  "2_sus4":[-1,-1,0,2,3,3], "2_sus2":[-1,-1,0,2,3,0], // D
  "4_maj":[0,2,2,1,0,0],   "4_m":[0,2,2,0,0,0],   "4_7":[0,2,0,1,0,0],
  "4_m7":[0,2,0,0,0,0],    "4_sus4":[0,2,2,2,0,0], "4_maj7":[0,2,1,1,0,0],    // E
  "7_maj":[3,2,0,0,0,3],   "7_7":[3,2,0,0,0,1],                                // G
  "9_maj":[-1,0,2,2,2,0],  "9_m":[-1,0,2,2,1,0],  "9_7":[-1,0,2,0,2,0],
  "9_m7":[-1,0,2,0,1,0],   "9_maj7":[-1,0,2,1,2,0],
  "9_sus2":[-1,0,2,2,0,0], "9_sus4":[-1,0,2,2,3,0],                            // A
  "11_7":[-1,2,1,2,0,2]                                                        // B7
};
/* formas móveis (pestana) — casas relativas; 1 = casa da pestana */
const BARRE_E = { maj:[1,3,3,2,1,1], m:[1,3,3,1,1,1], "7":[1,3,1,2,1,1], m7:[1,3,1,1,1,1], maj7:[1,3,2,2,1,1], sus4:[1,3,3,3,1,1] };
const BARRE_A = { maj:[-1,1,3,3,3,1], m:[-1,1,3,3,2,1], "7":[-1,1,3,1,3,1], m7:[-1,1,3,1,2,1], maj7:[-1,1,3,2,3,1], sus2:[-1,1,3,3,1,1], sus4:[-1,1,3,3,4,1] };

function chordShape(sym){
  const p = parseChord(sym);
  if (!p) return null;
  const q = normQual(p.qual);
  const open = OPEN_SHAPES[p.semi + "_" + q];
  if (open) return { frets: open, baseFret: 1, barre: null, bass: p.bass };
  const eFret = ((p.semi - 4) % 12 + 12) % 12;
  const aFret = ((p.semi - 9) % 12 + 12) % 12;
  const cand = [];
  if (BARRE_E[q]) cand.push({ rel: BARRE_E[q], fret: eFret === 0 ? 12 : eFret, from: 6 });
  if (BARRE_A[q]) cand.push({ rel: BARRE_A[q], fret: aFret === 0 ? 12 : aFret, from: 5 });
  if (!cand.length) return null;
  cand.sort((a,b) => a.fret - b.fret);
  const c = cand[0];
  const frets = c.rel.map(v => v === -1 ? -1 : v + c.fret - 1);
  return { frets, baseFret: c.fret, barre: { fret: c.fret, from: c.from }, bass: p.bass };
}

function chordSVG(shape){
  const W = 200, H = 226, left = 34, top = 40, sw = 26, fh = 34, NF = 4;
  const base = shape.baseFret <= 1 ? 1 : shape.baseFret;
  const x = st => left + (6 - st) * sw;             // corda 6 à esquerda
  const yF = f => top + (f - .5) * fh;              // centro da casa relativa f
  let s = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" role="img" aria-label="Diagrama do acorde">`;
  // pestana (atrás das linhas)
  if (shape.barre){
    const rel = shape.barre.fret - base + 1;
    if (rel >= 1 && rel <= NF)
      s += `<rect x="${x(shape.barre.from)-9}" y="${yF(rel)-9}" width="${x(1)-x(shape.barre.from)+18}" height="18" rx="9" fill="#d9a441" opacity=".92"/>`;
  }
  for (let f = 0; f <= NF; f++){
    const y = top + f * fh;
    s += `<line x1="${x(6)}" y1="${y}" x2="${x(1)}" y2="${y}" stroke="#5a4a36" stroke-width="${f===0 && base===1 ? 6 : 1.6}" stroke-linecap="round"/>`;
  }
  for (let st = 1; st <= 6; st++)
    s += `<line x1="${x(st)}" y1="${top}" x2="${x(st)}" y2="${top + NF*fh}" stroke="#7a6c58" stroke-width="${1 + (st-1)*.28}"/>`;
  if (base > 1)
    s += `<text x="${left-12}" y="${yF(1)+5}" fill="#a8977f" font-size="14" text-anchor="end" font-family="system-ui">${base}ª</text>`;
  shape.frets.forEach((f, i) => {
    const st = 6 - i, cx = x(st);
    if (f === -1) s += `<text x="${cx}" y="${top-14}" fill="#7a6c58" font-size="15" text-anchor="middle" font-family="system-ui">×</text>`;
    else if (f === 0) s += `<circle cx="${cx}" cy="${top-18}" r="5.5" fill="none" stroke="#a8977f" stroke-width="1.8"/>`;
    else {
      const rel = f - base + 1;
      if (rel >= 1 && rel <= NF)
        s += `<circle cx="${cx}" cy="${yF(rel)}" r="9" fill="#f0bd5e" stroke="#171310" stroke-width="1.5"/>`;
    }
  });
  return s + "</svg>";
}

/* ============================ CIFRA → HTML ============================ */
function parseCifraLine(line){
  const chords = []; let lyric = ""; let last = 0;
  const re = /\[([^\]\n]+)\]/g; let m;
  while ((m = re.exec(line))){
    lyric += line.slice(last, m.index);
    chords.push({ sym: m[1], pos: lyric.length });
    last = re.lastIndex;
  }
  lyric += line.slice(last);
  return { chords, lyric };
}
function renderCifraHTML(content, delta, preferFlat){
  const lines = String(content||"").replace(/\r/g,"").split("\n");
  let html = "";
  for (const raw of lines){
    const { chords, lyric } = parseCifraLine(raw);
    const shown = chords.map(c => transposeChord(c.sym, delta, preferFlat));
    if (!chords.length){
      html += `<div class="ln">${esc(lyric) || "&nbsp;"}</div>`;
    } else if (lyric.trim() === ""){
      html += `<div class="ln chords-only">` + shown.map(c =>
        `<span class="chordtxt" data-ch="${esc(c)}">${esc(c)}</span>`).join("&nbsp;&nbsp;") + `</div>`;
    } else {
      let cline = "", col = 0;
      chords.forEach((c, i) => {
        const name = shown[i];
        const target = Math.max(c.pos, col + (col > 0 ? 1 : 0));
        cline += " ".repeat(target - col);
        cline += `<span class="chordtxt" data-ch="${esc(name)}">${esc(name)}</span>`;
        col = target + name.length;
      });
      html += `<div class="ln">${cline}</div><div class="ln">${esc(lyric)}</div>`;
    }
  }
  return html;
}

/* ============================ BATIDA → HTML ============================ */
const STRUM_SYM = { D:"↓", U:"↑", X:"×", "-":"·" };
const STRUM_CLS = { D:"d", U:"u", X:"x", "-":"r" };
function beatLabel(i, perBeat){
  const sub = i % perBeat, beat = Math.floor(i / perBeat) + 1;
  if (sub === 0) return String(beat);
  if (perBeat === 2) return "e";
  return ["","e","&","a"][sub] || "";
}
function renderStrumHTML(block){
  const pat = block.pattern && block.pattern.length ? block.pattern : ["D","-","D","U","-","U","D","U"];
  const perBeat = pat.length % 4 === 0 ? pat.length / 4 : 1;
  let cells = pat.map((v, i) =>
    `<div class="beat ${STRUM_CLS[v]||"r"} ${perBeat>1 && i%perBeat===0 && i>0 ? "group-start":""}">
       <span class="sym">${STRUM_SYM[v]||"·"}</span><span class="n">${beatLabel(i, perBeat)}</span>
     </div>`).join("");
  let foot = `<div class="strum-foot">
      ${block.bpm ? `<span class="bpm">Andamento: <b>${esc(block.bpm)} bpm</b></span>` : ""}
      <span class="bpm">↓ para baixo &nbsp;·&nbsp; ↑ para cima &nbsp;·&nbsp; × abafada</span>
    </div>`;
  return `<div class="strum"><div class="strum-lane">${cells}</div>${foot}
    ${block.audio ? `<audio class="player" controls preload="none" src="${esc(block.audio)}"></audio>` : ""}</div>`;
}

/* ============================ DADOS DE DEMONSTRAÇÃO ============================ */
function demoSeed(){
  const now = new Date().toISOString();

<script>
/* ============================ MODAIS / SHEETS ============================ */
function openSheet(build){
  const back = el("div", { class:"modal-back", onclick: e => { if (e.target === back) close(); } });
  const sheet = el("div", { class:"sheet", role:"dialog", "aria-modal":"true" }, el("div", { class:"grab" }));
  back.append(sheet);
  const close = () => { back.remove(); document.removeEventListener("keydown", onKey); };
  const onKey = e => { if (e.key === "Escape") close(); };
  document.addEventListener("keydown", onKey);
  $("#modal-root").append(back);
  build(sheet, close);
  return close;
}
function openConfirm(title, msg, okLabel = "Confirmar", danger = false){
  return new Promise(res => {
    openSheet((sheet, close) => {
      sheet.append(
        el("h2", {}, title),
        el("p", { class:"sub" }, msg),
        el("div", { class:"actions" },
          el("button", { class:"btn ghost", onclick: () => { close(); res(false); } }, "Cancelar"),
          el("button", { class:"btn" + (danger ? " danger" : ""), onclick: () => { close(); res(true); } }, okLabel)
        )
      );
    });
  });
}
function openChordModal(sym){
  openSheet((sheet, close) => {
    const shape = chordShape(sym);
    const p = parseChord(sym);
    const wrap = el("div", { class:"diagram-wrap" },
      el("div", { class:"cname" }, sym)
    );
    if (p && p.bass) wrap.append(el("div", { class:"cbass" }, "com baixo em " + p.bass));
    if (shape) wrap.append(el("div", { html: chordSVG(shape) }));
    else wrap.append(el("div", { class:"nodiag" }, "Diagrama automático indisponível para este acorde. Pergunte ao professor a montagem — ou toque a versão mais simples dele (ex.: sem a extensão)."));

}

/* ============================ LOGIN ============================ */
function openLogin(){
  openSheet((sheet, close) => {
    const email = el("input", { class:"input", type:"email", autocomplete:"username", placeholder:"seu@email.com" });
    const pass  = el("input", { class:"input", type:"password", autocomplete:"current-password", placeholder:"••••••••" });
    const btn = el("button", { class:"btn block", onclick: doLogin }, "Entrar");
    async function doLogin(){
      btn.disabled = true; btn.textContent = "Entrando…";
      try {
        await SB.login(email.value.trim(), pass.value);
        await SB.loadRole();
        toast(S.role === "professor" ? "Bem-vindo, professor!" : "Bem-vindo!", "ok");
        close(); location.hash = ""; route();
      } catch(err){
        toast(err.message, "err");
        btn.disabled = false; btn.textContent = "Entrar";
      }
    }
    pass.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    const forgot = el("button", { class:"btn small ghost", style:"margin-top:10px;width:100%", onclick: async () => {
      const em = email.value.trim();
      if (!em){ toast("Digite seu e-mail acima primeiro.", "err"); email.focus(); return; }
      forgot.disabled = true; forgot.textContent = "Enviando…";
      try { await SB.recover(em); toast("Enviamos um link de redefinição para " + em + ".", "ok"); close(); }
      catch(e){ toast(e.message, "err"); forgot.disabled = false; forgot.textContent = "Esqueci a senha"; }
    } }, "Esqueci a senha");
    sheet.append(
      el("h2", {}, "Entrar"),
      el("p", { class:"sub", style:"margin-bottom:14px" }, "Entre com seu e-mail e senha."),
      el("div", { class:"field" }, el("label", {}, "E-mail"), email),
      el("div", { class:"field" }, el("label", {}, "Senha"), pass),
      btn, forgot
    );
    setTimeout(() => email.focus(), 60);
  });
}

/* ============================ REDEFINIR SENHA ============================ */
function recoveryParams(){
  const h = location.hash.replace(/^#\/?/, "");
  if (!h.includes("access_token=") || !h.includes("type=recovery")) return null;
  const q = new URLSearchParams(h);
  return { access_token: q.get("access_token"), refresh_token: q.get("refresh_token"), expires_in: parseInt(q.get("expires_in") || "3600", 10) };
}
function openPasswordReset(tok){
  openSheet((sheet, close) => {
    const p1 = el("input", { class:"input", type:"password", autocomplete:"new-password", placeholder:"Nova senha (mín. 8 caracteres)" });
    const p2 = el("input", { class:"input", type:"password", autocomplete:"new-password", placeholder:"Repita a nova senha" });
    const btn = el("button", { class:"btn block", onclick: save }, "Salvar nova senha");
    async function save(){
      if (p1.value.length < 8){ toast("Use pelo menos 8 caracteres.", "err"); return; }
      if (p1.value !== p2.value){ toast("As senhas não conferem.", "err"); return; }
      btn.disabled = true; btn.textContent = "Salvando…";
      try {
        const u = await SB.updatePassword(p1.value, tok.access_token);
        SB.saveSession({ access_token: tok.access_token, refresh_token: tok.refresh_token, expires_in: tok.expires_in, user: u || {} });
        history.replaceState(null, "", location.pathname + location.search);
        close(); toast("Senha atualizada — você já está na área do professor.", "ok");
        route();
      } catch(e){ toast(e.message, "err"); btn.disabled = false; btn.textContent = "Salvar nova senha"; }
    }
    sheet.append(
      el("h2", {}, "Definir nova senha"),
      el("p", { class:"sub", style:"margin-bottom:14px" }, "Você chegou aqui pelo link de redefinição enviado ao seu e-mail."),
      el("div", { class:"field" }, p1),
      el("div", { class:"field" }, p2),
      btn
    );
    setTimeout(() => p1.focus(), 60);
  });
}

/* ============================ HOME ============================ */
async function renderHome(){
  const v = $("#view");
  v.innerHTML = "";
  stopScroll(); $("#floatbar").innerHTML = "";
  if (!S.remote) v.append(el("div", { class:"banner", html:"<b>Modo demonstração</b> — os dados ficam só neste aparelho. Siga o GUIA-INSTALACAO para conectar ao Supabase e liberar para os alunos." }));
  v.append(el("div", { class:"eyebrow" }, "Repertório"));
  v.append(el("h1", { class:"page" }, "Qual música vamos tocar?"));

  const inp = el("input", { type:"search", placeholder:"Buscar por música ou artista…", autocomplete:"off",
    oninput: () => renderList(inp.value) });
  v.append(el("div", { class:"search" },
    el("span", { html:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>' }),

  if (isEditor()){
    v.append(el("button", { class:"btn block", style:"margin-bottom:16px", onclick: () => location.hash = "#/e/nova" }, "＋ Nova música"));

  v.append(listWrap, el("hr", { class:"string-rule" }));

    (S.remote && !S.session) ? el("button", { onclick: openLogin }, "Área do professor") : "",
    el("div", { style:"margin-top:6px" }, CFG.app_name + " · v" + CONFIG.VERSION)
  ));

  function renderList(q = ""){
    const nq = norm(q);
    const rows = S.songs.filter(s => !nq || norm(s.title).includes(nq) || norm(s.artist).includes(nq));
    listWrap.innerHTML = "";
    if (!rows.length){
      listWrap.append(el("div", { class:"empty" },
        el("div", { class:"big" }, q ? "Nenhuma música encontrada" : "O caderno ainda está vazio"),
        el("div", {}, q ? "Confira a grafia ou tente só parte do nome." : (isEditor() ? "Toque em “＋ Nova música” para adicionar a primeira." : "O professor ainda vai adicionar as músicas."))));
      return;
    }
    rows.forEach(s => listWrap.append(
      el("button", { class:"songrow", onclick: () => location.hash = "#/m/" + s.id },
        el("span", { class:"dot", "aria-hidden":"true" }),
        el("span", { class:"info" },
          el("span", { class:"title" }, s.title),
          el("span", { class:"meta" },
            s.artist || "—",
            s.song_key ? "  ·  Tom " + s.song_key : "",

            s.difficulty ? el("span", { class:"badge b-" + norm(s.difficulty) }, s.difficulty) : "")),
        el("span", { class:"chev", html:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>' })
      )));

  renderList();

  // dados: cache instantâneo + atualização
  if (!S.songs.length && cachedSongs().length){ S.songs = cachedSongs(); renderList(inp.value); }

    S.songs = await DB().list();
    cacheSongs(S.songs);
    renderList(inp.value);
  } catch(err){
    if (!S.songs.length) toast("Sem conexão — mostrando o que está salvo no aparelho.", "err");
  }
