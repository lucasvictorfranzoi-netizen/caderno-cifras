/* ============================ PÁGINA DA MÚSICA ============================ */
async function renderSong(id){
  const v = $("#view");
  v.innerHTML = "";
  let song = null, offline = false;
  try {
    song = await DB().get(id);
    if (song && S.remote) safeStore.set("song_" + id, JSON.stringify(song));
  } catch(err){
    try { song = JSON.parse(safeStore.get("song_" + id) || "null"); } catch(e){}
    if (song) offline = true; else toast(err.message, "err");
  }
  if (offline) toast("Sem conexão — mostrando a última versão desta música.", "");
  if (!song){
    v.append(el("div", { class:"empty" }, el("div", { class:"big" }, "Música não encontrada"),
      el("div", {}, "Ela pode ter sido removida pelo professor.")));
    return;
  }
  let tp = 0;
  const preferFlat = usesFlats(song);

  const head = el("div", { class:"song-head" },
    el("div", { class:"eyebrow" }, "Cifra"),
    el("h1", {}, song.title),
    song.artist ? el("div", { class:"artist" }, song.artist) : "");
  const meta = el("div", { class:"song-meta" });
  const bar = el("div", { class:"songbar" });
  const body = el("div", { id:"songbody" });
  v.append(head, meta, bar, body);

  function renderMeta(){
    meta.innerHTML = "";
    if (song.song_key) meta.append(el("span", { class:"chip", html:"Tom: <b>" + esc(transposeChord(song.song_key, tp, preferFlat)) + "</b>" + (tp ? " <span style='color:var(--faint)'>(orig. " + esc(song.song_key) + ")</span>" : "") }));
    if (song.capo) meta.append(el("span", { class:"chip", html:"Capotraste: <b>" + esc(song.capo) + "ª casa</b>" }));
    if (song.difficulty) meta.append(el("span", { class:"badge b-" + norm(song.difficulty), style:"align-self:center" }, song.difficulty));
  }
  function renderBar(){
    bar.innerHTML = "";
    bar.append(el("div", { class:"grp" },
      el("span", { class:"lbl" }, "TOM"),
      el("button", { class:"tbtn", "aria-label":"Meio tom abaixo", onclick: () => { tp--; renderAll(); } }, "♭"),
      el("button", { class:"tbtn", "aria-label":"Tom original", onclick: () => { tp = 0; renderAll(); }, title:"Voltar ao tom original" },
        el("span", { class:"tom" }, tp === 0 ? (song.song_key || "0") : (tp > 0 ? "+" + tp : tp))),
      el("button", { class:"tbtn", "aria-label":"Meio tom acima", onclick: () => { tp++; renderAll(); } }, "♯")));
    bar.append(el("div", { class:"grp" },
      el("span", { class:"lbl" }, "LETRA"),
      el("button", { class:"tbtn", onclick: () => setCifraSize(-1) }, "A−"),
      el("button", { class:"tbtn", onclick: () => setCifraSize(+1) }, "A＋")));
    if (isEditor()) bar.append(el("button", { class:"tbtn", style:"margin-left:auto;color:var(--brass-bright)", onclick: () => location.hash = "#/e/" + song.id }, "✎ Editar"));
  }
  const TAGNAMES = { cifra:"Cifra", strum:"Batida", note:"Anotação" };
  function renderBlocks(){
    body.innerHTML = "";
    (song.blocks || []).forEach(b => {
      const wrap = el("div", { class:"block" });
      const tag = b.type === "tab" ? (b.subtype === "solo" ? "Solo" : "Riff") : (TAGNAMES[b.type] || "Seção");
      wrap.append(el("div", { class:"block-h" },
        el("span", { class:"tag" }, tag),
        b.title ? el("span", { class:"name" }, b.title) : ""));
      if (b.type === "cifra"){
        wrap.append(el("div", { class:"cifra", html: renderCifraHTML(b.content, tp, preferFlat) }));
      } else if (b.type === "tab"){
        wrap.append(el("pre", { class:"tab" }, b.content || ""));
        if (b.audio) wrap.append(el("audio", { class:"player", controls:true, preload:"none", src:b.audio }));
      } else if (b.type === "strum"){
        wrap.append(el("div", { html: renderStrumHTML(b) }));
      } else if (b.type === "note"){
        wrap.append(el("div", { class:"note" }, b.content || ""));
      }
      body.append(wrap);
    });
    if (!(song.blocks||[]).length) body.append(el("div", { class:"empty" }, "Esta música ainda não tem conteúdo."));
  }
  function renderAll(){ renderMeta(); renderBar(); renderBlocks(); }
  renderAll();

  body.addEventListener("click", e => {
    const c = e.target.closest(".chordtxt");
    if (c) openChordModal(c.dataset.ch);
  });
  renderFloatbar();
}

/* ============================ AUTO-SCROLL / FONTE ============================ */
function setCifraSize(d){
  let px = parseInt(safeStore.get("cifra_size") || "15", 10) + d;
  px = Math.min(22, Math.max(12, px));
  safeStore.set("cifra_size", String(px));
  document.documentElement.style.setProperty("--cifra-size", px + "px");
}
function renderFloatbar(){
  const f = $("#floatbar");
  f.innerHTML = ""; f.className = "";
  const spd = el("span", {}, "1.0×");
  const speedBox = el("div", { class:"speed" },
    el("button", { onclick: () => bumpSpeed(-0.25), "aria-label":"Mais devagar" }, "−"),
    spd,
    el("button", { onclick: () => bumpSpeed(+0.25), "aria-label":"Mais rápido" }, "＋"));
  const fab = el("button", { class:"fab", "aria-label":"Rolagem automática", onclick: toggleScroll,
    html:'<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>' });
  f.append(speedBox, fab);
  function bumpSpeed(d){
    S.scroller.speed = Math.min(3, Math.max(0.25, +(S.scroller.speed + d).toFixed(2)));
    spd.textContent = S.scroller.speed.toFixed(2).replace(/0$/,"") + "×";
  }
  function toggleScroll(){
    if (S.scroller.active) return stopScroll();
    S.scroller.active = true;
    f.classList.add("scrolling");
    fab.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
    let acc = 0;
    const step = () => {
      if (!S.scroller.active) return;
      acc += S.scroller.speed * 0.55;
      if (acc >= 1){ const px = Math.floor(acc); acc -= px; window.scrollBy(0, px); }
      if (window.innerHeight + window.scrollY >= document.body.scrollHeight - 2) return stopScroll();
      S.scroller.raf = requestAnimationFrame(step);
    };
    S.scroller.raf = requestAnimationFrame(step);
  }
}
function stopScroll(){
  S.scroller.active = false;
  cancelAnimationFrame(S.scroller.raf);
  const f = $("#floatbar");
  if (f){
    f.classList.remove("scrolling");
    const fab = f.querySelector(".fab");
    if (fab) fab.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  }
}
</script>
<script>
/* ============================ GRAVADOR DE ÁUDIO ============================ */
function pickMime(){
  if (!window.MediaRecorder) return null;
  for (const m of ["audio/mp4","audio/webm;codecs=opus","audio/webm"])
    if (MediaRecorder.isTypeSupported(m)) return m;
  return "";
}
const extFromMime = m => m && m.includes("mp4") ? "m4a" : m && m.includes("ogg") ? "ogg" : "webm";

function openRecorder(onUse){
  openSheet(async (sheet, close) => {
    sheet.append(el("h2", {}, "Gravar áudio"),
      el("p", { class:"sub" }, "Grave você tocando a batida ou o trecho, bem perto do violão. Dica: 10 a 30 segundos bastam."));
    const ui = el("div", { class:"rec-ui" });
    sheet.append(ui);
    let stream, rec, chunks = [], t0 = 0, timer, blob = null, url = null;
    function cleanup(){ clearInterval(timer); if (stream) stream.getTracks().forEach(t => t.stop()); if (url) URL.revokeObjectURL(url); }
    const origClose = close;
    close = () => { cleanup(); origClose(); };

    function showIdle(){
      ui.innerHTML = "";
      ui.append(el("button", { class:"btn block", onclick: start }, "● Iniciar gravação"));
    }
    function showRecording(){
      ui.innerHTML = "";
      const time = el("div", { class:"time live" }, el("span", { class:"recdot" }), "0:00");
      ui.append(time, el("button", { class:"btn block ghost", onclick: stop }, "■ Parar"));
      t0 = Date.now();
      timer = setInterval(() => { time.lastChild.nodeValue = ""; time.childNodes[1].nodeValue = fmtTime((Date.now()-t0)/1000); }, 250);
    }
    function showPreview(){
      ui.innerHTML = "";
      url = URL.createObjectURL(blob);
      ui.append(
        el("audio", { class:"player", controls:true, src:url }),
        el("div", { class:"actions" },
          el("button", { class:"btn ghost", onclick: () => { blob = null; showIdle(); } }, "Regravar"),
          el("button", { class:"btn", onclick: () => { const b = blob; close(); onUse(b); } }, "Usar este áudio")));
    }
    async function start(){
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      } catch(e){
        ui.innerHTML = "";
        ui.append(el("p", { class:"sub" }, "Não foi possível acessar o microfone. Verifique a permissão do navegador — ou envie um arquivo de áudio gravado em outro app."));
        return;
      }
      const mime = pickMime();
      if (mime === null){ ui.append(el("p", { class:"sub" }, "Este navegador não grava áudio. Use a opção de enviar arquivo.")); return; }
      chunks = [];
      rec = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
      rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
      rec.onstop = () => {
        blob = new Blob(chunks, { type: rec.mimeType || mime || "audio/webm" });
        clearInterval(timer);
        stream.getTracks().forEach(t => t.stop());
        showPreview();
      };
      rec.start();
      showRecording();
    }
    function stop(){ if (rec && rec.state !== "inactive") rec.stop(); }
    showIdle();
    sheet.append(el("div", { class:"actions" }, el("button", { class:"btn ghost", onclick: () => close() }, "Cancelar")));
  });
}

/* widget de áudio dentro de um bloco do editor */
function audioWidget(block, rerender){
  const box = el("div", { style:"margin-top:10px" });
  const has = block.audio || block._pendingBlob;
  if (has){
    const src = block._pendingBlob ? URL.createObjectURL(block._pendingBlob) : block.audio;
    box.append(
      el("audio", { class:"player", controls:true, preload:"none", src }),
      el("div", { style:"display:flex;gap:8px;margin-top:8px" },
        el("button", { class:"btn small ghost", onclick: () => openRecorder(b => { block._pendingBlob = b; block.audio = null; rerender(); }) }, "● Regravar"),
        el("button", { class:"btn small ghost", onclick: () => { block.audio = null; delete block._pendingBlob; rerender(); } }, "Remover áudio")));
  } else {
    const file = el("input", { type:"file", accept:"audio/*", style:"display:none",
      onchange: e => { const f = e.target.files[0]; if (f){ block._pendingBlob = f; block.audio = null; rerender(); } } });
    box.append(el("div", { style:"display:flex;gap:8px;flex-wrap:wrap" },
      el("button", { class:"btn small ghost", onclick: () => openRecorder(b => { block._pendingBlob = b; rerender(); }) }, "● Gravar áudio"),
      el("label", { class:"btn small ghost", style:"cursor:pointer" }, "Enviar arquivo", file)));
  }
  return box;
}

/* ============================ EDITOR ============================ */
const BLOCK_TYPES = [
  { key:"cifra", label:"Cifra", desc:"Letra + acordes", icon:"♪" },
  { key:"strum", label:"Batida", desc:"Ritmo da mão direita", icon:"↓↑" },
  { key:"riff",  label:"Riff", desc:"Tablatura curta", icon:"𝄞" },
  { key:"solo",  label:"Solo", desc:"Tablatura do solo", icon:"⚡" },
  { key:"note",  label:"Anotação", desc:"Dica ou observação", icon:"✎" }
];
function newBlock(kind){
  const base = { id: uuid(), title: "" };
  if (kind === "cifra") return { ...base, type:"cifra", content:"" };
  if (kind === "strum") return { ...base, type:"strum", pattern:["D","-","D","U","-","U","D","U"], bpm:"", audio:null };
  if (kind === "riff")  return { ...base, type:"tab", subtype:"riff", content:"e|-----------------|\nB|-----------------|\nG|-----------------|\nD|-----------------|\nA|-----------------|\nE|-----------------|", audio:null };
  if (kind === "solo")  return { ...base, type:"tab", subtype:"solo", content:"e|-----------------|\nB|-----------------|\nG|-----------------|\nD|-----------------|\nA|-----------------|\nE|-----------------|", audio:null };
  return { ...base, type:"note", content:"" };
}
function insertAtCursor(ta, text){
  const s = ta.selectionStart ?? ta.value.length, e = ta.selectionEnd ?? s;
  ta.value = ta.value.slice(0, s) + text + ta.value.slice(e);
  ta.focus();
  ta.selectionStart = ta.selectionEnd = s + text.length;
  ta.dispatchEvent(new Event("input"));
}

async function renderEditorView(id){
  const v = $("#view");
  v.innerHTML = "";
  stopScroll(); $("#floatbar").innerHTML = "";
  if (!isEditor()){ toast("Somente o professor pode editar.", "err"); location.hash = ""; return; }

  let W;
  const isNew = id === "nova";
  if (isNew){
    W = { id: uuid(), title:"", artist:"", song_key:"", capo:0, difficulty:"", tags:"", blocks:[] };
  } else {
    let s = null;
    try { s = await DB().get(id); } catch(e){ toast(e.message, "err"); }
    if (!s){ v.append(el("div", { class:"empty" }, "Música não encontrada.")); return; }
    W = JSON.parse(JSON.stringify(s));
  }
  const preferFlat = () => (W.song_key||"").includes("b");

  v.append(el("div", { class:"eyebrow" }, isNew ? "Nova música" : "Editando"));
  v.append(el("h1", { class:"page" }, isNew ? "Adicionar música" : W.title || "Editar música"));
  v.append(el("p", { class:"sub", style:"margin-bottom:16px" }, "Monte a música em seções, na ordem em que o aluno vai tocar. Nada aparece para os alunos antes de você salvar."));

  /* --- dados gerais --- */
  const tTitle = el("input", { class:"input", value:W.title, placeholder:"Ex.: Nome da música", oninput:e => W.title = e.target.value });
  const tArtist = el("input", { class:"input", value:W.artist||"", placeholder:"Ex.: Artista / banda", oninput:e => W.artist = e.target.value });
  const tKey = el("input", { class:"input", value:W.song_key||"", placeholder:"Ex.: G, Am, Bb", list:"keys", oninput:e => W.song_key = e.target.value.trim() });
  const tCapo = el("input", { class:"input", type:"number", min:0, max:12, value:W.capo||0, oninput:e => W.capo = parseInt(e.target.value||"0",10) });
  const tDiff = el("select", { class:"input", onchange:e => W.difficulty = e.target.value },
    el("option", { value:"" }, "Dificuldade…"),
    ...["iniciante","intermediário","avançado"].map(d => el("option", { value:d, selected: W.difficulty === d }, d)));
  v.append(
    el("datalist", { id:"keys" }, ...["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B","Am","Bm","Cm","Dm","Em","Fm","Gm"].map(k => el("option", { value:k }))),
    el("div", { class:"field" }, el("label", {}, "Título da música *"), tTitle),
    el("div", { class:"field" }, el("label", {}, "Artista"), tArtist),
    el("div", { class:"row3" },
      el("div", { class:"field" }, el("label", {}, "Tom"), tKey),
      el("div", { class:"field" }, el("label", {}, "Capotraste"), tCapo),
      el("div", { class:"field" }, el("label", {}, "Nível"), tDiff)),
    el("hr", { class:"string-rule" }));

  /* --- blocos --- */
  const blocksWrap = el("div");
  v.append(blocksWrap);

  function blockEditor(b, idx){
    const card = el("div", { class:"edblock" });
    const tag = b.type === "tab" ? (b.subtype === "solo" ? "Solo" : "Riff") : ({ cifra:"Cifra", strum:"Batida", note:"Anotação" }[b.type] || "Seção");
    card.append(el("div", { class:"edhead" },
      el("span", { class:"tag" }, tag),
      el("button", { class:"mv", "aria-label":"Mover para cima", disabled: idx === 0, onclick: () => { const t = W.blocks[idx-1]; W.blocks[idx-1] = b; W.blocks[idx] = t; renderBlocks(); } }, "↑"),
      el("button", { class:"mv", "aria-label":"Mover para baixo", disabled: idx === W.blocks.length-1, onclick: () => { const t = W.blocks[idx+1]; W.blocks[idx+1] = b; W.blocks[idx] = t; renderBlocks(); } }, "↓"),
      el("button", { class:"mv del", "aria-label":"Remover seção", onclick: async () => {
        if (await openConfirm("Remover esta seção?", "“" + (b.title || tag) + "” será removida da música.", "Remover", true)){
          W.blocks.splice(idx,1); renderBlocks();
        }
      } }, "✕")));
    card.append(el("div", { class:"field" },
      el("label", {}, "Nome da seção"),
      el("input", { class:"input", value:b.title||"", placeholder: b.type === "strum" ? "Ex.: Batida principal, Batida do refrão" : "Ex.: Intro, Verso 1, Refrão",
        oninput:e => b.title = e.target.value })));

    if (b.type === "cifra"){
      const ta = el("textarea", { class:"input", rows:8, placeholder:"Escreva a letra e toque nos acordes abaixo para inseri-los.\nEx.: [G]Toda manhã o sol [D]chega devagar",
        oninput:e => { b.content = e.target.value; if (prev.style.display !== "none") prevBody.innerHTML = renderCifraHTML(b.content, 0, preferFlat()); } });
      ta.value = b.content || "";
      // paleta de acordes
      const quick = ["C","D","Dm","E","Em","F","G","A","Am","B7"];
      const pal = el("div", { class:"palette" },
        ...quick.map(c => el("button", { class:"pc", type:"button", onclick:() => insertAtCursor(ta, "["+c+"]") }, c)));
      const nRoot = el("select", { class:"input", style:"width:auto;padding:8px 10px" }, ...["C","C#","Db","D","D#","Eb","E","F","F#","Gb","G","G#","Ab","A","A#","Bb","B"].map(n => el("option",{},n)));
      const nQual = el("select", { class:"input", style:"width:auto;padding:8px 10px" },
        ...[["","maior"],["m","menor"],["7","7"],["m7","m7"],["maj7","7M (maj7)"],["sus4","sus4"],["sus2","sus2"]].map(([v,l]) => el("option",{value:v},l)));
      const builder = el("div", { style:"display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px" },
        el("span", { style:"font-size:12.5px;color:var(--muted)" }, "Outro acorde:"), nRoot, nQual,
        el("button", { class:"btn small ghost", type:"button", onclick:() => insertAtCursor(ta, "[" + nRoot.value + nQual.value + "]") }, "Inserir"));
      const prevBody = el("div", { class:"cifra" });
      const prev = el("div", { style:"display:none;border-top:1px dashed var(--line);margin-top:10px;padding-top:10px" },
        el("div", { class:"eyebrow" }, "Como o aluno verá"), prevBody);
      const toggle = el("button", { class:"btn small ghost", type:"button", style:"margin-top:10px", onclick:() => {
        const open = prev.style.display === "none";
        prev.style.display = open ? "block" : "none";
        toggle.textContent = open ? "Ocultar pré-visualização" : "Pré-visualizar";
        if (open) prevBody.innerHTML = renderCifraHTML(b.content, 0, preferFlat());
      } }, "Pré-visualizar");
      card.append(pal, builder, ta, toggle, prev);
    }
    else if (b.type === "tab"){
      const ta = el("textarea", { class:"input", rows:8, spellcheck:"false", oninput:e => b.content = e.target.value });
      ta.value = b.content || "";
      card.append(el("div", { class:"field" }, el("label", {}, "Tablatura (cordas e — E A D G B e — de baixo para cima)"), ta));
      card.append(el("label", { style:"display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:4px 0 0" }, "Áudio do trecho (opcional)"));
      card.append(audioWidget(b, renderBlocks));
    }
    else if (b.type === "strum"){
      const sel = el("select", { class:"input", style:"width:auto;padding:8px 10px", onchange:e => {
        const n = parseInt(e.target.value,10);
        const p = b.pattern || [];
        b.pattern = Array.from({ length:n }, (_,i) => p[i] || "-");
        renderBlocks();
      } }, ...[[8,"8 tempos (1 compasso)"],[16,"16 tempos (2 compassos)"],[4,"4 tempos (simples)"]].map(([val,l]) => el("option", { value:val, selected:(b.pattern||[]).length === val }, l)));
      const beats = el("div", { class:"beats" });
      const CYCLE = { "-":"D", D:"U", U:"X", X:"-" };
      (b.pattern || []).forEach((val, i) => {
        const slot = el("button", { class:"bslot " + (STRUM_CLS[val]||""), type:"button", "aria-label":"Tempo " + (i+1),
          onclick:() => { b.pattern[i] = CYCLE[b.pattern[i]] || "D"; slot.className = "bslot " + (STRUM_CLS[b.pattern[i]]||""); slot.textContent = STRUM_SYM[b.pattern[i]]; } },
          STRUM_SYM[val] || "·");
        beats.append(slot);
      });
      const bpm = el("input", { class:"input", type:"number", min:30, max:240, value:b.bpm||"", placeholder:"bpm", style:"width:110px",
        oninput:e => b.bpm = e.target.value });
      card.append(
        el("div", { class:"strum-editor" },
          el("div", { style:"display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px" }, sel,
            el("div", { style:"display:flex;align-items:center;gap:6px" }, el("span", { style:"font-size:12.5px;color:var(--muted)" }, "Andamento:"), bpm)),
          beats,
          el("div", { class:"hint" }, "Toque em cada tempo para alternar: · pausa → ↓ para baixo → ↑ para cima → × abafada")),
        el("label", { style:"display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:12px 0 0" }, "Grave você tocando esta batida (recomendado)"),
        audioWidget(b, renderBlocks));
    }
    else { // note
      const ta = el("textarea", { class:"input", rows:3, style:"font-family:var(--body);white-space:pre-wrap", placeholder:"Ex.: Nessa parte, palheta mais leve; capriche na troca do F.",
        oninput:e => b.content = e.target.value });
      ta.value = b.content || "";
      card.append(ta);
    }
    return card;
  }

  function renderBlocks(){
    blocksWrap.innerHTML = "";
    W.blocks.forEach((b, i) => blocksWrap.append(blockEditor(b, i)));
    blocksWrap.append(
      el("div", { class:"eyebrow", style:"margin-top:6px" }, "Adicionar seção"),
      el("div", { class:"addmenu" },
        ...BLOCK_TYPES.map(t => el("button", { type:"button", onclick:() => { W.blocks.push(newBlock(t.key)); renderBlocks(); scrollToAdd(); } },
          el("span", { class:"big" }, t.icon), t.label, el("span", { style:"display:block;font-size:12px;color:var(--faint);font-weight:400" }, t.desc)))));
  }
  function scrollToAdd(){ setTimeout(() => { const cards = blocksWrap.querySelectorAll(".edblock"); if (cards.length && cards[cards.length-1].scrollIntoView) cards[cards.length-1].scrollIntoView({ behavior:"smooth", block:"center" }); }, 40); }
  renderBlocks();

  /* --- salvar / excluir --- */
  const saveBtn = el("button", { class:"btn block", onclick: save }, isNew ? "Salvar música" : "Salvar alterações");
  const foot = el("div", { style:"margin-top:22px;display:flex;flex-direction:column;gap:10px" }, saveBtn);
  if (!isNew) foot.append(el("button", { class:"btn block danger", onclick: async () => {
    if (await openConfirm("Excluir esta música?", "“" + W.title + "” sairá do caderno de todos os alunos. Essa ação não pode ser desfeita.", "Excluir música", true)){
      try { await DB().remove(W.id); toast("Música excluída."); location.hash = ""; }
      catch(e){ toast(e.message, "err"); }
    }
  } }, "Excluir música"));
  v.append(el("hr", { class:"string-rule" }), foot);

  async function save(){
    if (!W.title.trim()){ toast("Dê um título à música.", "err"); tTitle.focus(); return; }
    saveBtn.disabled = true; saveBtn.textContent = "Salvando…";
    try {
      for (const b of W.blocks){
        if (b._pendingBlob){
          if (S.remote){
            const path = W.id + "/" + b.id + "-" + Date.now() + "." + extFromMime(b._pendingBlob.type);
            saveBtn.textContent = "Enviando áudio…";
            b.audio = await RemoteDB.uploadAudio(b._pendingBlob, path);
          } else {
            b.audio = await DemoDB.uploadAudio(b._pendingBlob);
          }
          delete b._pendingBlob;
        }
      }
      const payload = {
        id: W.id, title: W.title.trim(), artist: (W.artist||"").trim(),
        song_key: (W.song_key||"").trim(), capo: W.capo || 0,
        difficulty: W.difficulty || "", tags: (W.tags||"").trim(),
        blocks: W.blocks.map(({ _pendingBlob, ...rest }) => rest),
        updated_at: new Date().toISOString()
      };
      await DB().upsert(payload);
      toast("Música salva!", "ok");
      location.hash = "#/m/" + W.id;
    } catch(e){
      toast(e.message || "Não foi possível salvar.", "err");
      saveBtn.disabled = false; saveBtn.textContent = "Salvar";
    }
  }
}

/* ============================ BACKUP ============================ */
async function exportData(){
  try {
    let full;
    if (S.remote) full = await SB.rest("songs?select=*&order=title.asc");
    else full = DemoDB._all();
    const blob = new Blob([JSON.stringify({ app:"caderno-de-cifras", version:CONFIG.VERSION, exported_at:new Date().toISOString(), songs: full }, null, 2)], { type:"application/json" });
    const a = el("a", { href: URL.createObjectURL(blob), download: "caderno-cifras-backup-" + new Date().toISOString().slice(0,10) + ".json" });
    document.body.append(a); a.click(); a.remove();
    toast("Backup exportado.", "ok");
  } catch(e){ toast(e.message, "err"); }
}
async function importData(file){
  try {
    const j = JSON.parse(await file.text());
    const songs = Array.isArray(j) ? j : j.songs;
    if (!Array.isArray(songs)) throw new Error("Arquivo inválido.");
    if (!(await openConfirm("Importar backup?", songs.length + " música(s) serão adicionadas/atualizadas no caderno.", "Importar"))) return;
    for (const s of songs){ if (s && s.id && s.title) await DB().upsert(s); }
    toast("Backup importado!", "ok");
    S.songs = []; route();
  } catch(e){ toast("Falha na importação: " + e.message, "err"); }
}
</script>
<script>
/* ============================ ROTEADOR / INICIALIZAÇÃO ============================ */
/* ====== Formatação ====== */
function formatBRL(v){ if (v == null || v === "") return null; const n = Number(v); return isNaN(n) ? String(v) : "R$ " + n.toFixed(2).replace(".", ","); }

/* ============================ BOAS-VINDAS / LOGIN (tela) ============================ */
function renderWelcome(){
  const v = $("#view"); v.innerHTML = ""; stopScroll(); $("#floatbar").innerHTML = "";
  v.append(el("div", { class:"eyebrow" }, "Caderno de Cifras"));
  v.append(el("h1", { class:"page" }, "Entrar"));
  v.append(el("p", { class:"sub", style:"margin:-6px 0 18px" }, "As músicas das aulas de " + CFG.professor_name + "."));
  const email = el("input", { class:"input", type:"email", autocomplete:"username", placeholder:"seu@email.com" });
  const pass  = el("input", { class:"input", type:"password", autocomplete:"current-password", placeholder:"sua senha" });
  const btn   = el("button", { class:"btn block", onclick: doLogin }, "Entrar");
  async function doLogin(){
    if (!email.value.trim()){ toast("Digite seu e-mail.", "err"); return; }
    btn.disabled = true; btn.textContent = "Entrando…";
    try {
      await SB.login(email.value.trim(), pass.value);
      await SB.loadRole();
      toast(S.role === "professor" ? "Bem-vindo, professor!" : "Bem-vindo!", "ok");
      location.hash = ""; route();
    } catch(err){ toast(err.message, "err"); btn.disabled = false; btn.textContent = "Entrar"; }
  }
  pass.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  const forgot = el("button", { class:"btn small ghost", style:"margin-top:10px;width:100%", onclick: async () => {
    const em = email.value.trim();
    if (!em){ toast("Digite seu e-mail acima primeiro.", "err"); email.focus(); return; }
    forgot.disabled = true; forgot.textContent = "Enviando…";
    try { await SB.recover(em); toast("Enviamos um link de redefinição para " + em + ".", "ok"); }
    catch(e){ toast(e.message, "err"); } finally { forgot.disabled = false; forgot.textContent = "Esqueci a senha"; }
  } }, "Esqueci a senha");
  v.append(el("div", { class:"field" }, el("label", {}, "E-mail"), email),
           el("div", { class:"field" }, el("label", {}, "Senha"), pass),
           btn, forgot,
           el("hr", { class:"string-rule" }),
           el("p", { class:"sub", html:"É aluno novo? Abra o <b>link de convite</b> que o professor enviou para criar sua conta." }));
  setTimeout(() => email.focus(), 60);
}

/* ============================ CADASTRO POR CONVITE ============================ */
function renderConvite(code){
  const v = $("#view"); v.innerHTML = ""; stopScroll(); $("#floatbar").innerHTML = "";
  if (!S.remote){ v.append(el("h1", { class:"page" }, "Indisponível"), el("p", { class:"sub" }, "O cadastro não funciona no modo demonstração.")); return; }
  if (S.session){
    v.append(el("div", { class:"eyebrow" }, "Convite"),
      el("h1", { class:"page" }, "Você já está conectado"),
      el("button", { class:"btn block", style:"margin-top:14px", onclick: () => { location.hash = ""; route(); } }, "Ir para as músicas"));
    return;
  }
  v.append(el("div", { class:"eyebrow" }, "Convite do professor"));
  v.append(el("h1", { class:"page" }, "Criar minha conta"));
  v.append(el("p", { class:"sub", style:"margin:-6px 0 18px" }, "Você foi convidado para o caderno de " + CFG.professor_name + "."));
  const nome = el("input", { class:"input", type:"text", autocomplete:"nickname", placeholder:"como você quer ser chamado", maxlength:40 });
  const email = el("input", { class:"input", type:"email", autocomplete:"email", placeholder:"seu@email.com" });
  const p1 = el("input", { class:"input", type:"password", autocomplete:"new-password", placeholder:"crie uma senha (mín. 6 caracteres)" });
  const p2 = el("input", { class:"input", type:"password", autocomplete:"new-password", placeholder:"repita a senha" });
  const btn = el("button", { class:"btn block", onclick: doSignup }, "Criar minha conta");
  async function doSignup(){
    const nm = nome.value.trim(), em = email.value.trim();
    if (nm.length < 2){ toast("Escolha um nome de usuário (mín. 2 letras).", "err"); return; }
    if (!em.includes("@")){ toast("Digite um e-mail válido.", "err"); return; }
    if (p1.value.length < 6){ toast("A senha precisa de ao menos 6 caracteres.", "err"); return; }
    if (p1.value !== p2.value){ toast("As senhas não conferem.", "err"); return; }
    btn.disabled = true; btn.textContent = "Criando…";
    try {
      const res = await SB.signup(em, p1.value, code, nm);
      if (res.session){
        await SB.loadRole();
        toast("Conta criada — bem-vindo, " + nm + "!", "ok");
        history.replaceState(null, "", location.pathname);
        location.hash = ""; route();
      } else {
        v.innerHTML = "";
        v.append(el("div", { class:"eyebrow" }, "Quase lá"),
          el("h1", { class:"page" }, "Confirme seu e-mail"),
          el("p", { class:"sub" }, "Enviamos um link de confirmação para " + em + ". Abra-o e depois entre com seu e-mail e senha."),
          el("button", { class:"btn block", style:"margin-top:14px", onclick: () => { location.hash = ""; SB.logout(); route(); } }, "Ir para o login"));
      }
    } catch(err){ toast(err.message, "err"); btn.disabled = false; btn.textContent = "Criar minha conta"; }
  }
  p2.addEventListener("keydown", e => { if (e.key === "Enter") doSignup(); });
  v.append(el("div", { class:"field" }, el("label", {}, "Nome de usuário"), nome),
           el("div", { class:"field" }, el("label", {}, "E-mail"), email),
           el("div", { class:"field" }, el("label", {}, "Senha"), p1),
           el("div", { class:"field" }, el("label", {}, "Repita a senha"), p2),
           btn);
  setTimeout(() => nome.focus(), 60);
}

/* ============================ ALUNOS COM ACESSO (professor) ============================ */
function randomCode(){
  const a = new Uint8Array(10);
  if (crypto && crypto.getRandomValues) crypto.getRandomValues(a); else for (let i=0;i<a.length;i++) a[i]=Math.floor(Math.random()*256);
  const abc = "abcdefghijkmnpqrstuvwxyz23456789";
  return Array.from(a).map(x => abc[x % abc.length]).join("");
}
function openConvidar(){
  openSheet((sheet, close) => {
    sheet.append(el("h2", {}, "Alunos com acesso"),
      el("p", { class:"sub", style:"margin-bottom:14px" }, "Gere um link para adicionar um aluno, edite a mensalidade e o vencimento de cada um, ou remova quem quiser. Só quem tem o link cria conta — o caderno não se espalha."));
    const linkArea = el("div");
    const gen = el("button", { class:"btn block", onclick: async () => {
      gen.disabled = true; gen.textContent = "Gerando…";
      try {
        const code = randomCode();
        await SB.rest("convites", { method:"POST", headers:{ "Prefer":"return=minimal" }, body: JSON.stringify([{ codigo: code }]) });
        showLink(location.origin + location.pathname + "#/convite/" + code); loadLists();
      } catch(e){ toast(e.message, "err"); }
      gen.disabled = false; gen.textContent = "Gerar novo link de convite";
    } }, "Gerar link de convite");
    function showLink(link){
      linkArea.innerHTML = "";
      const inp = el("input", { class:"input", value: link, readonly:"readonly", style:"font-size:13px" });
      const copy = el("button", { class:"btn small", style:"margin-top:8px;width:100%", onclick: async () => {
        try { await navigator.clipboard.writeText(link); copy.textContent = "Copiado ✓"; setTimeout(() => copy.textContent = "Copiar link", 1500); }
        catch(e){ inp.select(); try { document.execCommand("copy"); } catch(_){} }
      } }, "Copiar link");
      linkArea.append(el("p", { class:"sub", style:"margin:14px 0 6px" }, "Envie este link ao aluno:"), inp, copy);
    }
    const lists = el("div", { style:"margin-top:18px" });
    async function loadLists(){
      lists.innerHTML = "";
      try {
        const alunos = await SB.rest("alunos?select=email,nome,criado_em,mensalidade,vencimento&order=nome.asc");
        const conv   = await SB.rest("convites?select=codigo,usado&usado=is.false&order=criado_em.desc");
        lists.append(el("div", { class:"eyebrow", style:"margin-top:6px" }, "Alunos com acesso (" + alunos.length + ")"));
        if (!alunos.length) lists.append(el("p", { class:"sub" }, "Nenhum aluno ainda."));
        alunos.forEach(a => lists.append(alunoCard(a)));
        lists.append(el("div", { class:"eyebrow", style:"margin-top:16px" }, "Convites pendentes (" + conv.length + ")"));
        if (!conv.length) lists.append(el("p", { class:"sub" }, "Nenhum convite pendente."));
        conv.forEach(c => lists.append(el("div", { style:"display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft)" },
          el("span", { style:"flex:1;font-size:14px" }, "Link " + c.codigo.slice(0,4) + "…"),
          el("button", { class:"btn small ghost", onclick: async () => { await SB.rest("convites?codigo=eq." + encodeURIComponent(c.codigo), { method:"DELETE" }); loadLists(); } }, "Cancelar"))));
      } catch(e){ lists.append(el("p", { class:"sub" }, "Não foi possível carregar as listas.")); }
    }
    function alunoCard(a){
      const mens = el("input", { class:"input", type:"number", step:"0.01", min:"0", value: (a.mensalidade != null ? a.mensalidade : ""), placeholder:"ex.: 150.00" });
      const venc = el("input", { class:"input", type:"date", value: (a.vencimento || "") });
      const save = el("button", { class:"btn small", style:"margin-top:8px", onclick: async () => {
        save.disabled = true; save.textContent = "Salvando…";
        try {
          await SB.rest("alunos?email=eq." + encodeURIComponent(a.email), { method:"PATCH", headers:{ "Prefer":"return=minimal" },
            body: JSON.stringify({ mensalidade: (mens.value === "" ? null : Number(mens.value)), vencimento: (venc.value || null) }) });
          toast("Dados atualizados.", "ok"); loadLists();
        } catch(e){ toast(e.message, "err"); save.disabled = false; save.textContent = "Salvar"; }
      } }, "Salvar");
      const body = el("div", { hidden:true, style:"margin-top:10px" },
        el("div", { class:"field" }, el("label", {}, "Valor da mensalidade (R$)"), mens),
        el("div", { class:"field" }, el("label", {}, "Data de vencimento"), venc),
        save);
      const resumo = el("span", { style:"font-size:11.5px;color:var(--muted)" },
        (a.mensalidade != null ? formatBRL(a.mensalidade) : "sem mensalidade") + (a.vencimento ? " · vence " + fmtDate(a.vencimento) : ""));
      const head = el("div", { style:"display:flex;align-items:center;gap:8px" },
        el("span", { style:"flex:1;font-weight:600" }, a.nome || "(sem nome)"),
        el("button", { class:"btn small ghost", onclick: () => { body.hidden = !body.hidden; } }, "Editar"),
        el("button", { class:"btn small ghost", onclick: async () => { if (confirm("Remover o acesso de " + (a.nome || "este aluno") + "?")){ await SB.rest("alunos?email=eq." + encodeURIComponent(a.email), { method:"DELETE" }); loadLists(); } } }, "Remover"));
      return el("div", { style:"border:1px solid var(--line-soft);border-radius:10px;padding:10px 12px;margin-bottom:8px" },
        head, el("div", { style:"margin-top:3px" }, resumo), body);
    }
    sheet.append(gen, linkArea, lists, el("div", { class:"actions" }, el("button", { class:"btn ghost", onclick: close }, "Fechar")));
    loadLists();
  });
}

/* ============================ PERFIL (aluno e professor) ============================ */
function openPerfil(){
  openSheet(async (sheet, close) => {
    sheet.append(el("h2", {}, "Perfil"));
    const email = (S.session && S.session.email) || "—";
    const isProf = isEditor();
    let row = null;
    if (S.remote && email !== "—"){
      try { const rows = await SB.rest("alunos?select=nome,criado_em,mensalidade,vencimento&email=eq." + encodeURIComponent(email)); row = rows && rows[0]; } catch(e){}
    }
    const nome = isProf ? CFG.professor_name : ((row && row.nome) || "—");
    const entrada = (row && row.criado_em) || (S.session && S.session.created_at) || null;
    const info = (label, value) => el("div", { style:"display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft)" },
      el("span", { style:"color:var(--muted);font-size:14px" }, label),
      el("span", { style:"font-weight:600;font-size:14px;text-align:right" }, value));
    const wrap = el("div", {});
    wrap.append(info("Nome de usuário", nome));
    wrap.append(info("E-mail", email));
    wrap.append(info("Papel", isProf ? "Professor" : "Aluno"));
    wrap.append(info("Entrou em", entrada ? fmtDate(entrada) : "—"));
    if (!isProf){
      wrap.append(info("Mensalidade", (row && row.mensalidade != null) ? formatBRL(row.mensalidade) : "A definir"));
      wrap.append(info("Vencimento", (row && row.vencimento) ? fmtDate(row.vencimento) : "A definir"));
    }
    sheet.append(wrap, el("div", { class:"actions" }, el("button", { class:"btn ghost", onclick: close }, "Fechar")));
  });
}

function route(){
  const h = location.hash.replace(/^#\/?/, "");
  const [seg, id] = h.split("/");
  if (seg === "convite" && id) S.route = { view:"convite", code:id };
  else if (seg === "m" && id) S.route = { view:"song", id };
  else if (seg === "e" && id) S.route = { view:"editor", id };
  else S.route = { view:"home" };
  renderTopbar();
  window.scrollTo(0, 0);
  // cadastro por convite: acessível sem login
  if (S.route.view === "convite") return renderConvite(S.route.code);
  // tudo o mais exige estar logado (leitura agora é só para membros)
  if (S.remote && !S.session) return renderWelcome();
  if (S.route.view === "song") renderSong(S.route.id);
  else if (S.route.view === "editor") renderEditorView(S.route.id);
  else renderHome();
}
function handleRecoveryHash(){
  if (!S.remote) return false;
  const rec = recoveryParams();
  if (!rec) return false;
  history.replaceState(null, "", location.pathname + location.search);
  openPasswordReset(rec);
  return true;
}
window.addEventListener("hashchange", () => { if (!handleRecoveryHash()) route(); });

(async function init(){
  document.title = CONFIG.APP_NAME;
  const px = parseInt(safeStore.get("cifra_size") || "15", 10);
  document.documentElement.style.setProperty("--cifra-size", px + "px");
  if (S.remote) SB.loadSession();
  const rec = S.remote ? recoveryParams() : null;
  if (rec) history.replaceState(null, "", location.pathname + location.search);
  if (S.remote && S.session) await SB.loadRole();   // saber se é professor antes de desenhar
  route();
  loadConfig();
  if (rec) openPasswordReset(rec);   // aba nova (caso mais comum)
  if ("serviceWorker" in navigator && location.protocol === "https:"){
    try { navigator.serviceWorker.register("sw.js").catch(() => {}); } catch(e){}
  }
})();
</script>
</body>
